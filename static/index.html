<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kroma</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect x='4' y='4' width='24' height='24' rx='6' fill='%23eab308'/%3E%3Ctext x='16' y='23' font-family='Outfit,sans-serif' font-size='18' font-weight='800' text-anchor='middle' fill='%231a1200'%3EK%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<script src="/static/vendor/purify.min.js"></script>
<link rel="stylesheet" href="/static/app.css">
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">

  <a href="/" style="text-decoration:none;" class="logo" style="padding:0.25rem 0;">
    <svg width="100%" height="80" viewBox="140 55 400 120" role="img">
      <rect x="155" y="60" width="90" height="90" rx="20" fill="#1c1917" stroke="#eab308" stroke-width="2"/>
      <path d="M175 78 L223 78 L237 92 L237 138 L175 138 Z" fill="#292524" stroke="#3c3330" stroke-width="1"/>
      <path d="M223 78 L223 92 L237 92 Z" fill="#1c1917" stroke="#3c3330" stroke-width="1"/>
      <rect x="188" y="92" width="7" height="34" rx="2" fill="#eab308"/>
      <path d="M195 109 L209 94" stroke="#eab308" stroke-width="7" stroke-linecap="round" fill="none"/>
      <path d="M195 109 L211 126" stroke="#eab308" stroke-width="7" stroke-linecap="round" fill="none"/>
      <line x1="188" y1="132" x2="205" y2="132" stroke="#eab308" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
      <line x1="188" y1="137" x2="217" y2="137" stroke="#eab308" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
      <line x1="188" y1="142" x2="211" y2="142" stroke="#eab308" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
      <text x="262" y="122" font-family="'Outfit', sans-serif" font-size="58" font-weight="800" fill="#fafaf9" letter-spacing="-2">Kroma</text>
      <circle cx="270" cy="72" r="5" fill="#eab308"/>
      <text x="265" y="152" font-family="'DM Mono', monospace" font-size="13" font-weight="500" fill="#eab308" letter-spacing="4">ASK. LEARN. KNOW.</text>
    </svg>
  </a>

  <div class="sidebar-label">Demo access</div>
  <input
    id="demoKeyInput"
    type="password"
    placeholder="Demo key if required"
    autocomplete="off"
    oninput="storeDemoKey(this.value)"
    style="width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:0.65rem 0.75rem;font-family:'Outfit',sans-serif;font-size:0.9rem;outline:none;"
  >
  <div class="demo-note" id="publicDemoNote" style="display:none;"></div>

  <hr class="divider">

  <div class="sidebar-label">Upload</div>

  <label class="upload-area" id="uploadArea">
    <input type="file" id="fileInput" accept=".pdf,.txt,.md,.markdown" multiple>
    <svg class="upload-icon ui-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
      <path d="M14 2H7a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7z"/>
      <path d="M14 2v5h5"/>
      <path d="M9 13h6"/>
      <path d="M9 17h4"/>
    </svg>
    <span class="upload-title">Click or drag to upload</span>
    <span class="upload-hint">PDF, TXT, Markdown · 25MB max</span>
  </label>

  <button class="btn-primary" id="processBtn" onclick="processDocuments()">
    Process Documents
  </button>

  <hr class="divider">

  <div class="sidebar-label">Library</div>
  <div class="library-list" id="libraryList">
    <span class="empty-lib">No documents yet.</span>
  </div>

  <hr class="divider">

  <div class="btn-row">
    <button class="btn-secondary" onclick="clearLibrary()">Clear all</button>
    <button class="btn-secondary" onclick="newChat()">New chat</button>
  </div>

  <hr class="divider">
  <div class="sidebar-label">Tools</div>
  <button class="btn-primary" id="flashcardBtn" onclick="generateFlashcards()">
    <svg class="ui-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
      <path d="M8 6h11"/>
      <path d="M8 12h11"/>
      <path d="M8 18h11"/>
      <path d="M4 6h.01"/>
      <path d="M4 12h.01"/>
      <path d="M4 18h.01"/>
    </svg>
    <span>Flashcards</span>
  </button>
  <button class="btn-primary" id="quizBtn" onclick="generateQuiz()" style="background:var(--surface-2);color:var(--text-2);margin-top:-0.3rem;">
    <svg class="ui-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
      <circle cx="12" cy="12" r="9"/>
      <path d="M9.5 9a2.5 2.5 0 0 1 4.5 1.5c0 1.8-2 2.2-2 3.5"/>
      <path d="M12 17h.01"/>
    </svg>
    <span>Quiz me</span>
  </button>
  <button class="btn-primary" id="summaryBtn" onclick="generateSummary()" style="background:var(--surface-2);color:var(--text-2);margin-top:-0.3rem;">
    <svg class="ui-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
      <path d="M9 4h6"/>
      <path d="M9 4a2 2 0 0 0-2 2v1h10V6a2 2 0 0 0-2-2"/>
      <path d="M7 7H5v13a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7h-2"/>
      <path d="M9 13h6"/>
      <path d="M9 17h4"/>
    </svg>
    <span>Summarize</span>
  </button>
  <button class="btn-primary" id="businessCopilotBtn" onclick="showBusinessCopilot()" style="background:var(--surface-2);color:var(--text-2);margin-top:-0.3rem;">
    <svg class="ui-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
      <rect x="4" y="6" width="16" height="13" rx="2" stroke="currentColor" fill="none" stroke-width="2" stroke-linejoin="round"/>
      <path d="M4 11 L20 11" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <path d="M10 6 L10 19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </svg>
    <span>Knowledge Copilot</span>
  </button>
  <button class="btn-primary" id="knowledgeAuditBtn" onclick="showKnowledgeAudit()" style="background:var(--surface-2);color:var(--text-2);margin-top:-0.3rem;">
    <svg class="ui-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" stroke="currentColor" fill="none" stroke-width="2" stroke-linejoin="round"/>
      <path d="M14 2v6h6" stroke="currentColor" fill="none" stroke-width="2" stroke-linejoin="round"/>
      <path d="M9 15l2 2 4-4" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span>Knowledge Audit</span>
  </button>

  <hr class="divider">
  <div class="sidebar-label" style="display:flex;align-items:center;justify-content:space-between;">
    <span>History</span>
    <button onclick="clearHistory()" style="background:none;border:none;color:var(--text-3);font-size:0.7rem;cursor:pointer;font-family:'Outfit',sans-serif;">Clear</button>
  </div>
  <div class="library-list" id="historyList">
    <span class="empty-lib">No saved chats yet.</span>
  </div>

</aside>

<!-- MAIN -->
<main class="main">

  <div class="topbar">
    <div>
      <div class="topbar-title" id="topbarTitle">Kroma</div>
      <div class="topbar-sub" id="topbarSub">Your source-grounded study assistant</div>
    </div>
    <button class="btn-secondary" id="exportBtn" onclick="exportChatPDF()" style="width:auto;padding:0.5rem 1.25rem;display:none;flex-shrink:0;white-space:nowrap;max-width:140px;">
      <svg class="ui-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path d="M12 3v12"/>
        <path d="m7 10 5 5 5-5"/>
        <path d="M5 21h14"/>
      </svg>
      <span>Export Chat</span>
    </button>
  </div>

  <div class="metrics" id="metrics" style="display:none">
    <div class="metric-card">
      <span class="label">Documents</span>
      <span class="value" id="metDocs">0</span>
    </div>
    <div class="metric-card">
      <span class="label">Pages</span>
      <span class="value" id="metPages">0</span>
    </div>
    <div class="metric-card">
      <span class="label">Chunks</span>
      <span class="value" id="metChunks">0</span>
    </div>
  </div>

  <div class="suggestions" id="suggestionsBar" style="display:none;">
    <div class="suggestions-label">Suggested questions</div>
    <div class="suggestions-row" id="suggestionsRow"></div>
  </div>

  <div class="chat-wrapper" id="chatWrapper">
  </div>

  <div class="input-bar">
    <textarea
      id="chatInput"
      placeholder="Ask anything about your documents..."
      rows="1"
      onkeydown="handleKey(event)"
      oninput="autoResize(this)"
    ></textarea>
    <button class="btn-send" id="sendBtn" onclick="sendMessage()" aria-label="Send message" title="Send message">
      <svg class="ui-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path d="M12 19V5"/>
        <path d="m5 12 7-7 7 7"/>
      </svg>
    </button>
  </div>

</main>

<div class="toast" id="toast"></div>

<script src="/static/app.js"></script>

</body>
</html>
