<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kroma</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect x='4' y='4' width='24' height='24' rx='6' fill='%23eab308'/%3E%3Ctext x='16' y='23' font-family='Outfit,sans-serif' font-size='18' font-weight='800' text-anchor='middle' fill='%231a1200'%3EK%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<script src="/static/vendor/purify.min.js"></script>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg:       #1c1917;
    --surface:  #292524;
    --surface-2:#3c3330;
    --surface-3:#57534e;
    --gold:     #eab308;
    --gold-dim: #a16207;
    --gold-soft:#451a03;
    --cream:    #fef3c7;
    --text:     #fafaf9;
    --text-2:   #d6d3d1;
    --text-3:   #78716c;
    --border:   #3c3330;
    --radius:   10px;
    --shadow:   0 4px 24px rgba(0,0,0,0.4);
  }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    overflow: hidden;
    font-size: 15px;
  }

  /* GRAIN OVERLAY */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9998;
    opacity: 0.6;
  }

  /* TOP ACCENT */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    z-index: 9999;
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--surface-2); border-radius: 999px; }

  /* ── SIDEBAR ─────────────────────────────────────────────────────── */
  .sidebar {
    width: 268px;
    min-width: 268px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 1.5rem 1.1rem 1rem;
    gap: 0.8rem;
    overflow-y: auto;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 0.25rem;
  }

  .logo-mark {
    width: 28px;
    height: 28px;
    background: var(--gold);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.85rem;
    font-weight: 800;
    color: var(--bg);
    flex-shrink: 0;
  }

  .logo-text {
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.02em;
  }

  .sidebar-label {
    font-size: 0.90rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-3);
  }

  /* UPLOAD */
  .upload-area {
    background: var(--bg);
    border: 1.5px dashed var(--surface-2);
    border-radius: var(--radius);
    padding: 1.1rem 0.75rem;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    display: block;
  }

  .upload-area:hover {
    border-color: var(--gold-dim);
    background: #211f1d;
  }

  .upload-area.dragover {
    border-color: var(--gold);
    background: #1a1200;
  }

  .upload-area input { display: none; }

  .upload-icon {
    display: block;
    margin: 0 auto 0.35rem;
    color: var(--gold);
  }

  .upload-area .upload-title {
    font-size: 0.875rem;
    font-weight: 600;
    color: var(--text-2);
    display: block;
  }

  .upload-area .upload-hint {
    font-size: 0.75rem;
    color: var(--text-3);
    margin-top: 0.2rem;
    display: block;
  }

  .demo-note {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.65rem 0.75rem;
    color: var(--text-3);
    font-size: 0.78rem;
    line-height: 1.45;
  }

  /* BUTTONS */
  .btn-primary {
    background: var(--gold);
    color: #1a1200;
    border: none;
    border-radius: var(--radius);
    padding: 0.65rem 1rem;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    width: 100%;
    transition: background 0.15s, transform 0.1s;
    font-family: 'Outfit', sans-serif;
    letter-spacing: 0.01em;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.45rem;
  }

  .btn-primary:hover { background: #f59e0b; }
  .btn-primary:active { transform: scale(0.98); }
  .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

  .btn-secondary {
    background: var(--surface-2);
    color: var(--text-2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0.5rem 0.6rem;
    font-size: 0.95rem;
    font-weight: 500;
    cursor: pointer;
    flex: 1;
    transition: background 0.15s, color 0.15s;
    font-family: 'Outfit', sans-serif;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.4rem;
  }

  .btn-secondary:hover { background: var(--surface-3); color: var(--text); }

  .btn-row { display: flex; gap: 0.5rem; }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 0;
  }

  /* LIBRARY LIST */
  .library-list {
    display: flex;
    flex-direction: column;
    gap: 0.35rem;
  }

  .doc-item {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.55rem 0.65rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    transition: border-color 0.15s;
  }

  .doc-item:hover { border-color: var(--surface-3); }

  .doc-item.demo-doc {
    border-color: var(--gold-soft);
  }

  .doc-icon {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
    opacity: 0.7;
    color: var(--gold);
  }

  .doc-info { flex: 1; min-width: 0; }

  .doc-name {
    font-size: 1rem;
    font-weight: 600;
    color: var(--text-2);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .btn-delete {
    background: none;
    border: none;
    color: var(--surface-3);
    cursor: pointer;
    font-size: 0.85rem;
    padding: 0.2rem 0.3rem;
    border-radius: 4px;
    transition: color 0.15s, background 0.15s;
    flex-shrink: 0;
    line-height: 1;
  }

  .btn-delete:hover { color: #ef4444; background: rgba(239,68,68,0.1); }

  .empty-lib {
    font-size: 0.78rem;
    color: var(--text-3);
    padding: 0.25rem 0;
  }

  /* ── MAIN ────────────────────────────────────────────────────────── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg);
  }

  /* TOPBAR */
  .topbar {
    padding: 1.1rem 2rem 0.75rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
  }

  .topbar-title {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--text);
  }

  .topbar-sub {
    font-size: 1.1rem;
    color: var(--text-3);
    margin-top: 0.2rem;
  }

  /* METRICS */
  .metrics {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
  }

  .metric-card {
    flex: 1;
    padding: 0.75rem 1.5rem;
    border-right: 1px solid var(--border);
    text-align: center;
  }

  .metric-card:last-child { border-right: none; }

  .metric-card .label {
    font-size: 0.6rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.09em;
    color: var(--text-3);
    display: block;
    margin-bottom: 0.15rem;
  }

  .metric-card .value {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--gold);
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }

  /* CHAT AREA */
  .chat-wrapper {
    flex: 1;
    overflow-y: auto;
    padding: 1.25rem 2rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  /* EMPTY STATE */
  .empty-state {
    margin: auto;
    max-width: 560px;
    width: 100%;
    text-align: center;
    padding: 1.7rem;
  }

  .empty-icon {
    display: block;
    margin: 0 auto 1rem;
    color: var(--gold);
  }

  .ui-icon {
    width: 1em;
    height: 1em;
    display: inline-block;
    flex-shrink: 0;
    fill: none;
    stroke: currentColor;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .upload-icon.ui-icon {
    width: clamp(30px, 5vw, 38px);
    height: clamp(30px, 5vw, 38px);
  }

  .empty-icon.ui-icon {
    width: clamp(48px, 8vw, 64px);
    height: clamp(48px, 8vw, 64px);
  }

  .empty-state h3 {
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 0.5rem;
    letter-spacing: -0.01em;
  }

  .empty-state p {
    font-size: 1.1rem;
    color: var(--text-3);
    line-height: 1.6;
    margin-bottom: 1.5rem;
  }

  .steps {
    text-align: left;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 1.1rem;
  }

  .step {
    display: flex;
    align-items: flex-start;
    gap: 0.75rem;
    font-size: 1.1rem;
    color: var(--text-2);
    line-height: 1.5;
  }

  .step-num {
    background: var(--gold);
    color: #1a1200;
    border-radius: 999px;
    width: 22px;
    height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    font-weight: 800;
    flex-shrink: 0;
    margin-top: 0.1rem;
  }

  /* MESSAGES */
  .message {
    display: flex;
    gap: 0.75rem;
    max-width: 760px;
    width: 100%;
    align-self: flex-start;
    animation: fadeUp 0.2s ease;
  }

  .message.user {
    align-self: flex-end;
    flex-direction: row-reverse;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .avatar {
    width: 30px;
    height: 30px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.65rem;
    font-weight: 700;
    flex-shrink: 0;
    margin-top: 0.15rem;
    letter-spacing: 0.02em;
    border: 1px solid var(--border);
  }

  .avatar.user {
    background: var(--surface-2);
    color: var(--gold);
    border-color: rgba(245, 158, 11, 0.42);
    font-family: 'DM Mono', monospace;
  }

  .avatar.ai {
    background: var(--surface-2);
    color: var(--text-2);
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
  }

  .bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0.8rem 1rem;
    font-size: 1rem;
    line-height: 1.7;
    color: var(--text-2);
    max-width: calc(100% - 42px);
  }

  .bubble h1, .bubble h2, .bubble h3 {
    color: var(--text);
    font-weight: 700;
    margin: 0.75rem 0 0.4rem;
  }

  .bubble h1 { font-size: 1.2rem; }
  .bubble h2 { font-size: 1.1rem; }
  .bubble h3 { font-size: 1rem; }

  .bubble p { margin: 0.4rem 0; }

  .bubble ul, .bubble ol {
    padding-left: 1.4rem;
    margin: 0.4rem 0;
  }

  .bubble li { margin: 0.2rem 0; }

  .bubble code {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0.15rem 0.4rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    color: var(--gold);
  }

  .bubble pre {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.85rem 1rem;
    overflow-x: auto;
    margin: 0.6rem 0;
  }

  .bubble pre code {
    background: none;
    border: none;
    padding: 0;
    font-size: 0.85rem;
    color: var(--text-2);
  }

  .bubble table {
    width: 100%;
    border-collapse: collapse;
    margin: 0.6rem 0;
    font-size: 0.9rem;
  }

  .bubble th {
    background: var(--surface-2);
    color: var(--text);
    padding: 0.5rem 0.75rem;
    text-align: left;
    font-weight: 600;
  }

  .bubble td {
    padding: 0.45rem 0.75rem;
    border-top: 1px solid var(--border);
    color: var(--text-2);
  }

  .bubble tr:hover td { background: var(--surface-2); }

  .bubble strong { color: var(--text); font-weight: 700; }
  .bubble em { color: var(--text-2); }
  .bubble blockquote {
    border-left: 3px solid var(--gold-dim);
    padding-left: 0.75rem;
    color: var(--text-3);
    margin: 0.5rem 0;
  }

  .message.user .bubble {
    background: #1c1200;
    border-color: var(--gold-soft);
    color: var(--cream);
    border-radius: 12px 12px 4px 12px;
  }

  /* SOURCES */
  .sources {
    margin-top: 0.6rem;
    padding-top: 0.6rem;
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 0.45rem;
  }

  .source-summary {
    margin-top: 0.55rem;
    padding-top: 0.55rem;
    border-top: 1px solid var(--border);
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 0.35rem;
    color: var(--text-3);
    font-size: 0.76rem;
  }

  .source-summary-text {
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .source-toggle,
  .source-show-all {
    background: none;
    border: none;
    color: var(--gold);
    cursor: pointer;
    font-family: 'Outfit', sans-serif;
    font-size: 0.76rem;
    font-weight: 700;
    padding: 0.1rem 0.15rem;
  }

  .source-toggle:hover,
  .source-show-all:hover {
    color: #f59e0b;
  }

  .chat-sources {
    margin-top: 0.35rem;
  }

  .chat-sources[hidden],
  .chat-sources .source-tag[hidden] {
    display: none;
  }

  .source-tag {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.5rem 0.6rem;
    font-size: 0.72rem;
    color: var(--text-3);
  }

  .source-meta {
    color: var(--text-2);
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    line-height: 1.4;
  }

  .source-preview {
    margin-top: 0.3rem;
    color: var(--text-3);
    font-size: 0.78rem;
    line-height: 1.45;
  }

  /* THINKING */
  .thinking {
    display: flex;
    align-items: center;
    gap: 0.65rem;
    font-size: 0.82rem;
    color: var(--text-3);
    padding: 0.4rem 0;
    align-self: flex-start;
  }

  .dots { display: flex; gap: 4px; align-items: center; }

  .dots span {
    display: inline-block;
    width: 5px; height: 5px;
    background: var(--gold-dim);
    border-radius: 999px;
    animation: pulse 1.4s ease-in-out infinite;
  }

  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes pulse {
    0%, 60%, 100% { opacity: 0.3; transform: scale(1); }
    30% { opacity: 1; transform: scale(1.3); }
  }

  /* INPUT BAR */
  .input-bar {
    padding: 0.85rem 2rem 1rem;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    gap: 0.6rem;
    align-items: flex-end;
  }

  .input-bar textarea {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.75rem 1rem;
    font-size: 0.9rem;
    font-family: 'Outfit', sans-serif;
    color: var(--text);
    resize: none;
    min-height: 46px;
    max-height: 140px;
    outline: none;
    transition: border-color 0.2s;
    line-height: 1.5;
  }

  .input-bar textarea::placeholder { color: var(--text-3); }

  .input-bar textarea:focus {
    border-color: var(--gold-dim);
    box-shadow: 0 0 0 2px rgba(234,179,8,0.08);
  }

  .btn-send {
    background: var(--gold);
    color: #1a1200;
    border: none;
    border-radius: 10px;
    width: 44px;
    height: 44px;
    cursor: pointer;
    font-size: 1.1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, transform 0.1s;
    font-weight: 700;
  }

  .btn-send:hover { background: #f59e0b; }
  .btn-send:active { transform: scale(0.95); }
  .btn-send:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* TOAST */
  .toast {
    position: fixed;
    top: 1.25rem;
    left: 50%;
    transform: translateX(-50%) translateY(-8px);
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-2);
    padding: 0.65rem 1.25rem;
    border-radius: 999px;
    font-size: 1rem;
    font-weight: 600;
    opacity: 0;
    transition: opacity 0.25s, transform 0.25s;
    pointer-events: none;
    z-index: 9999;
    box-shadow: var(--shadow);
    white-space: nowrap;
  }

  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.error { border-color: #7f1d1d; color: #fca5a5; }
  .toast.success { border-color: var(--gold-soft); color: var(--gold); }

  @media print {
    body { background: white !important; color: black !important; }
    .sidebar, .topbar, .metrics, .input-bar, .toast { display: none !important; }
    .main { display: block !important; }
    .chat-wrapper { overflow: visible !important; padding: 1rem !important; }
    .message { max-width: 100% !important; page-break-inside: avoid; }
    .bubble {
      background: white !important;
      border: 1px solid #ccc !important;
      color: black !important;
      margin-bottom: 0.5rem;
    }
    .message.user .bubble {
      background: #f5f5f5 !important;
      border-color: #999 !important;
      color: black !important;
    }
    .avatar.user { background: #333 !important; color: white !important; }
    .avatar.ai { background: #eee !important; color: #333 !important; }
    .thinking { display: none !important; }
    .bubble pre, .bubble code { background: #f0f0f0 !important; color: #333 !important; }
    .bubble table { border-collapse: collapse !important; }
    .bubble th { background: #eee !important; color: black !important; }
    .bubble td { border-top: 1px solid #ccc !important; color: black !important; }

    .print-header {
      display: block !important;
      padding: 1rem 0;
      border-bottom: 2px solid #333;
      margin-bottom: 1rem;
      font-family: sans-serif;
    }
  }

 .print-header { display: none; }

  /* SUGGESTED QUESTIONS */
  .suggestions {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
    padding: 0.75rem 2rem 1rem;
    border-bottom: 1px solid var(--border);
  }

  .suggestions-label {
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-3);
    margin-bottom: 0.1rem;
  }

  .suggestions-row {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    justify-content: center;
  }

  .suggestion-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 0.45rem 0.9rem;
    font-size: 0.82rem;
    color: var(--text-2);
    cursor: pointer;
    font-family: 'Outfit', sans-serif;
    transition: border-color 0.15s, background 0.15s, color 0.15s;
    text-align: left;
    line-height: 1.4;
  }

  .suggestion-btn:hover {
    border-color: var(--gold-dim);
    background: #1c1200;
    color: var(--cream);
  }

  /* FLASHCARDS */
  .flashcard-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1rem;
    padding: 1.25rem 2rem;
    overflow-y: auto;
    flex: 1;
  }

  .flashcard {
    perspective: 1000px;
    height: 180px;
    cursor: pointer;
  }

  .flashcard-inner {
    position: relative;
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
    transition: transform 0.45s ease;
  }

  .flashcard.flipped .flashcard-inner {
    transform: rotateY(180deg);
  }

  .flashcard-front, .flashcard-back {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    border-radius: var(--radius);
    padding: 1.1rem 1.25rem;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .flashcard-front {
    background: var(--surface);
    border: 1px solid var(--border);
  }

  .flashcard-back {
    background: #1c1200;
    border: 1px solid var(--gold-soft);
    transform: rotateY(180deg);
    justify-content: flex-start;
    overflow-y: auto;
  }

  .flashcard-label {
    font-size: 0.6rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-3);
    margin-bottom: 0.5rem;
  }

  .flashcard-back .flashcard-label { color: var(--gold-dim); }

  .flashcard-text {
    font-size: 0.9rem;
    line-height: 1.5;
    color: var(--text-2);
    font-weight: 500;
  }

  .flashcard-back .flashcard-text { color: var(--cream); }

  .flashcard-back .sources {
    margin-top: 0.75rem;
    padding-top: 0.75rem;
    width: 100%;
  }

  /* QUIZ */
  .quiz-wrapper {
    flex: 1;
    overflow-y: auto;
    padding: 1.25rem 4rem;
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
    max-width: 860px;
    margin: 0 auto;
    width: 100%;
  }

  .quiz-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.75rem 2rem;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    gap: 1rem;
  }

  .quiz-header span {
    flex: 1;
  }

  .quiz-header span { font-size: 0.85rem; color: var(--text-3); flex:1; }

  .quiz-question {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.1rem 1.25rem;
  }

  .quiz-q-text {
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 0.85rem;
    line-height: 1.5;
  }

  .quiz-q-num {
    font-size: 0.8rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--gold-dim);
    margin-bottom: 0.4rem;
  }

  .quiz-choices {
    display: flex;
    flex-direction: column;
    gap: 0.45rem;
  }

 .quiz-choice {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.7rem 1rem;
    font-size: 1.2rem;
    color: var(--text-2);
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    text-align: left;
    font-family: 'Outfit', sans-serif;
    width: 100%;
  }

  .quiz-choice:hover { border-color: var(--gold-dim); background: #211f1d; }
  .quiz-choice.selected { border-color: var(--gold); background: #1c1200; color: var(--cream); }
  .quiz-choice.correct { border-color: #16a34a; background: #052e16; color: #86efac; }
  .quiz-choice.wrong { border-color: #dc2626; background: #450a0a; color: #fca5a5; }
  .quiz-choice.reveal-correct { border-color: #16a34a; background: #052e16; color: #86efac; }

  .quiz-explanation {
    margin-top: 0.65rem;
    padding: 0.6rem 0.85rem;
    background: var(--surface-2);
    border-radius: 6px;
    font-size: 0.82rem;
    color: var(--text-3);
    line-height: 1.5;
    display: none;
  }

  .quiz-explanation.show { display: block; }

  .quiz-score {
    background: var(--surface);
    border: 1px solid var(--gold-soft);
    border-radius: var(--radius);
    padding: 2rem;
    text-align: center;
    margin: auto;
    max-width: 400px;
  }

  .quiz-score-num {
    font-size: 3.5rem;
    font-weight: 800;
    color: var(--gold);
    line-height: 1;
    margin-bottom: 0.5rem;
  }

  .quiz-score-label {
    font-size: 1rem;
    color: var(--text-2);
    margin-bottom: 1.25rem;
  }

  .quiz-score-msg {
    font-size: 0.85rem;
    color: var(--text-3);
    margin-bottom: 1.5rem;
  }

  /* HISTORY */
  .history-item {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.55rem 0.65rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    transition: border-color 0.15s;
    cursor: pointer;
    width: 100%;
    text-align: left;
    font-family: 'Outfit', sans-serif;
  }

  .history-item:hover { border-color: var(--gold-dim); }

  .history-delete {
    background: none;
    border: none;
    color: var(--surface-3);
    cursor: pointer;
    font-size: 0.75rem;
    padding: 0.2rem 0.25rem;
    border-radius: 4px;
    flex-shrink: 0;
    line-height: 1;
    opacity: 0;
    transition: opacity 0.15s, color 0.15s, background 0.15s;
  }

  .history-item:hover .history-delete { opacity: 1; }

  .history-delete:hover {
    color: #ef4444;
    background: rgba(239,68,68,0.1);
  }

  .history-info { flex: 1; min-width: 0; }

  .history-title {
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--text-2);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .history-date {
    font-size: 0.7rem;
    color: var(--text-3);
    margin-top: 0.1rem;
  }
  .flashcard-toolbar {
    padding: 0.75rem 2rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    background: var(--bg);
  }

  .flashcard-toolbar span {
    font-size: 0.85rem;
    color: var(--text-3);
  }

  /* CONFIRM DIALOG */
  .confirm-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 10000;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .confirm-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem;
    max-width: 320px;
    width: 90%;
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .confirm-msg {
    font-size: 0.95rem;
    color: var(--text-2);
    line-height: 1.5;
  }

  .confirm-btns {
    display: flex;
    gap: 0.5rem;
    justify-content: flex-end;
  }
</style>
</head>
<body>

<!-- SIDEBAR -->

      <path d="M195 109 L209 94" stroke="#eab308" stroke-width="7" stroke-linecap="round" fill="none"/>
      <path d="M195 109 L211 126" stroke="#eab308" stroke-width="7" stroke-linecap="round" fill="none"/>
      <line x1="188" y1="132" x2="205" y2="132" stroke="#eab308" stroke-width="2" stroke-linecap="round" opacity="0.8"/>

  <div class="sidebar-label">Demo access</div>

  <div class="sidebar-label">Upload</div>

  <label class="upload-area" id="uploadArea">
    <input type="file" id="fileInput" accept=".pdf,.txt,.md,.markdown" multiple>
    <svg class="upload-icon ui-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">

    <span class="upload-title">Click or drag to upload</span>

  <button class="btn-primary" id="processBtn" onclick="processDocuments()">

      <path d="M8 18h11"/>

      <path d="M4 12h.01"/>
      <path d="M4 18h.01"/>
    </svg>
    <span>Flashcards</span>
  </button>
  <button class="btn-primary" id="quizBtn" onclick="generateQuiz()" style="background:var(--surface-2);color:var(--text-2);margin-top:-0.3rem;">
    <svg class="ui-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
      <circle cx="12" cy="12" r="9"/>
      <path d="M9.5 9a2.5 2.5 0 0 1 4.5 1.5c0 1.8-2 2.2-2 3.5"/>
      <path d="M12 17h.01"/>
    </svg>
    <span>Quiz me</span>
  </button>
  <button class="btn-primary" id="summaryBtn" onclick="generateSummary()" style="background:var(--surface-2);color:var(--text-2);margin-top:-0.3rem;">
    <svg class="ui-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
      <path d="M9 4h6"/>
      <path d="M9 4a2 2 0 0 0-2 2v1h10V6a2 2 0 0 0-2-2"/>

<main class="main">

<div class="toast" id="toast"></div>

<script>
  let chatHistory = [];
  let isIndexed = false;
  let loadedChatId = null;
  let currentView = 'chat';
  const DEMO_KEY_STORAGE = 'kroma_demo_key';
  const NO_PROCESSED_MESSAGE = 'No processed documents are available. Upload and process a document first.';
  const PUBLIC_DEMO_NOTE = 'Public demo uses a sample document. Enter demo key to test your own files.';
  let demoKeyRequired = false;
  let publicDemoQuestions = [];
  let publicDemoQuestionLimit = 180;
  let publicDemoDocument = 'kroma-public-demo.md';

  function storeDemoKey(value) {
    if (value) sessionStorage.setItem(DEMO_KEY_STORAGE, value);
    else sessionStorage.removeItem(DEMO_KEY_STORAGE);
    renderDemoAccessState();
  }

  function apiFetch(url, options = {}) {
    const headers = new Headers(options.headers || {});
    const demoKey = sessionStorage.getItem(DEMO_KEY_STORAGE);
    if (demoKey) headers.set('X-Kroma-Demo-Key', demoKey);
    return fetch(url, { ...options, headers });
  }

  function hasDemoKey() {
    return Boolean(sessionStorage.getItem(DEMO_KEY_STORAGE));
  }

  function isPublicDemoMode() {
    return demoKeyRequired && !hasDemoKey();
  }

  function renderDemoAccessState() {
    const note = document.getElementById('publicDemoNote');
    const chatInput = document.getElementById('chatInput');
    if (!note) return;
    if (!demoKeyRequired) {
      note.style.display = 'none';
      note.textContent = '';
      if (chatInput) chatInput.placeholder = 'Ask anything about your documents...';
      return;
    }
    note.style.display = 'block';
    note.textContent = hasDemoKey()
      ? 'Demo key entered. Custom file tools are unlocked for this tab.'
      : PUBLIC_DEMO_NOTE;
    if (chatInput) {
      chatInput.placeholder = hasDemoKey()
        ? 'Ask anything about your documents...'
        : 'Choose a suggested sample question...';
    }
  }

  function resetDocumentSession() {
    chatHistory = [];
    loadedChatId = null;
    currentView = 'chat';
    document.getElementById('exportBtn').style.display = 'none';
    document.getElementById('suggestionsBar').style.display = 'none';
  }

  function createIcon(name, className = 'ui-icon') {
    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.setAttribute('class', className);
    svg.setAttribute('viewBox', '0 0 24 24');
    svg.setAttribute('aria-hidden', 'true');
    svg.setAttribute('focusable', 'false');

    const addPath = d => {
      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('d', d);
      svg.appendChild(path);
    };
    const addCircle = attrs => {
      const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      Object.entries(attrs).forEach(([key, value]) => circle.setAttribute(key, value));
      svg.appendChild(circle);
    };

    const paths = {
      document: ['M14 2H7a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7z', 'M14 2v5h5', 'M9 13h6', 'M9 17h4'],
      list: ['M8 6h11', 'M8 12h11', 'M8 18h11', 'M4 6h.01', 'M4 12h.01', 'M4 18h.01'],
      clipboard: ['M9 4h6', 'M9 4a2 2 0 0 0-2 2v1h10V6a2 2 0 0 0-2-2', 'M7 7H5v13a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7h-2', 'M9 13h6', 'M9 17h4'],
      download: ['M12 3v12', 'm7 10 5 5 5-5', 'M5 21h14'],
      folder: ['M3 6a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z']
    };

    if (name === 'quiz') {
      addCircle({ cx: '12', cy: '12', r: '9' });
      addPath('M9.5 9a2.5 2.5 0 0 1 4.5 1.5c0 1.8-2 2.2-2 3.5');
      addPath('M12 17h.01');
      return svg;
    }

    (paths[name] || paths.document).forEach(addPath);
    return svg;
  }

  function setIconButton(button, iconName, label) {
    button.textContent = '';
    const text = document.createElement('span');
    text.textContent = label;
    button.appendChild(createIcon(iconName));
    button.appendChild(text);
  }

  function renderSafeMarkdown(target, text) {
    target.innerHTML = DOMPurify.sanitize(marked.parse(String(text ?? '')));
  }

  async function init() {
    const demoKeyInput = document.getElementById('demoKeyInput');
    if (demoKeyInput) demoKeyInput.value = sessionStorage.getItem(DEMO_KEY_STORAGE) || '';
    try {
      const res = await fetch('/api/status');
      const data = await res.json();
      demoKeyRequired = Boolean(data.demo_key_required);
      publicDemoQuestions = Array.isArray(data.public_demo?.questions) ? data.public_demo.questions : [];
      publicDemoQuestionLimit = Number(data.public_demo?.question_limit) || 180;
      publicDemoDocument = data.public_demo?.document || 'kroma-public-demo.md';
      renderDemoAccessState();
      isIndexed = Boolean(data.indexed);
      if (isPublicDemoMode()) {
        isIndexed = true;
        document.getElementById('metrics').style.display = 'none';
        renderPublicDemoLibrary();
        document.getElementById('topbarSub').textContent = 'Public sample document';
        if (chatHistory.length === 0) {
          renderPublicDemoWelcome();
          renderSuggestions(publicDemoQuestions);
        }
        return;
      }
      if (data.stats) updateMetrics(data.stats);
      else document.getElementById('metrics').style.display = 'none';
      renderLibrary(data.docs || []);
      if (isIndexed) {
        const es = document.getElementById('emptyState');
        if (es) es.style.display = 'none';
        document.getElementById('topbarSub').textContent = 'Ask anything about your documents';
        if (chatHistory.length === 0) fetchSuggestions();
      } else {
        resetDocumentSession();
        const wrapper = document.getElementById('chatWrapper');
        wrapper.innerHTML = `
          <div class="empty-state" id="emptyState">
            <svg class="empty-icon ui-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M3 6a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
              <path d="M7 12h10"/>
              <path d="M7 16h6"/>
            </svg>
            <h3>Ask your documents anything</h3>
            <p>${NO_PROCESSED_MESSAGE}</p>
            <div class="steps">
              <div class="step"><span class="step-num">1</span><span>Upload a supported file from your computer</span></div>
              <div class="step"><span class="step-num">2</span><span>Click <strong style="color:var(--gold)">Process Documents</strong> to prepare your files</span></div>
              <div class="step"><span class="step-num">3</span><span>Ask questions and review the cited sources</span></div>
            </div>
          </div>`;
      }
    } catch(e) {}
  }

  function renderPublicDemoWelcome() {
    const wrapper = document.getElementById('chatWrapper');
    wrapper.replaceChildren();
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.id = 'emptyState';
    empty.innerHTML = `
      <svg class="empty-icon ui-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path d="M3 6a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <path d="M7 12h10"/>
        <path d="M7 16h6"/>
      </svg>
      <h3>Try Kroma with a sample document</h3>
    `;
    const body = document.createElement('p');
    body.textContent = PUBLIC_DEMO_NOTE;
    empty.appendChild(body);
    wrapper.appendChild(empty);
  }

  function renderPublicDemoLibrary() {
    const list = document.getElementById('libraryList');
    list.replaceChildren();

    const item = document.createElement('div');
    item.className = 'doc-item demo-doc';

    const checkbox = document.createElement('input');
    checkbox.type = 'checkbox';
    checkbox.checked = true;
    checkbox.disabled = true;
    checkbox.style.cssText = 'accent-color:var(--gold);flex-shrink:0;';

    const icon = createIcon('document', 'doc-icon ui-icon');

    const info = document.createElement('div');
    info.className = 'doc-info';

    const docTitle = document.createElement('div');
    docTitle.className = 'doc-name';
    docTitle.title = publicDemoDocument;

  uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
  uploadArea.addEventListener('drop', async e => {

    uploadArea.classList.remove('dragover');

    const form = new FormData();

    const res = await apiFetch('/api/upload', { method: 'POST', body: form });
    if (res.ok) showToast(`Uploaded: ${file.name}`, 'success');

      showToast(data.detail || `Failed: ${file.name}`, 'error');

      showToast('Enter demo key to process custom files.', 'error');

  async function sendMessage() {
    const input = document.getElementById('chatInput');
    const question = input.value.trim();
    if (!question) return;
    const publicDemo = isPublicDemoMode();
    if (!isIndexed && !publicDemo) { showToast(NO_PROCESSED_MESSAGE, 'error'); return; }
    if (publicDemo && question.length > publicDemoQuestionLimit) {
      showToast(`Public demo questions are limited to ${publicDemoQuestionLimit} characters.`, 'error');
      return;
    }

    const selected = publicDemo ? [] : [...document.querySelectorAll('.doc-check:checked')].map(el => el.dataset.name);
    if (!publicDemo && selected.length === 0) { showToast('Select at least one document', 'error'); return; }

    input.value = '';
    autoResize(input);
    document.getElementById('suggestionsBar').style.display = 'none';
    appendMessage('user', question);
    chatHistory.push({ role: 'user', content: question });

    const thinking = appendThinking();
    document.getElementById('sendBtn').disabled = true;

    try {
      const res = await apiFetch(publicDemo ? '/api/demo/chat' : '/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(publicDemo ? { question } : { question, history: chatHistory.slice(-16), selected_docs: selected })
      });
      const data = await res.json();
      thinking.remove();
      if (!res.ok) {
        appendMessage('ai', data.detail || 'Request failed.');
        return;
      }
      const sources = data.show_sources ? (data.sources || []) : [];
      appendMessage('ai', data.answer, sources);
      chatHistory.push({ role: 'assistant', content: data.answer, sources, show_sources: data.show_sources });
    document.getElementById('exportBtn').style.display = 'block';
    } catch(e) {
      thinking.remove();
      appendMessage('ai', 'Something went wrong. Please try again.');
    }
    document.getElementById('sendBtn').disabled = false;
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 140) + 'px';
  }

  const CHAT_SOURCE_PREVIEW_LIMIT = 3;
  let chatSourceDisclosureId = 0;

  function sourceLocationLabel(source) {
    if (source?.location_label) return source.location_label;
    return source?.page !== undefined && source?.page !== null && source.page !== ''
      ? `Page ${source.page}`
      : 'Document';
  }

  function formatSourceLocation(source) {
    return ` · ${sourceLocationLabel(source)}`;
  }

  function formatSourceSummary(sources) {
    const first = sources[0] || {};
    const filename = first?.source || 'Unknown source';
    const firstLocation = `${filename}${formatSourceLocation(first)}`;
    const uniqueLocations = new Set(
      sources.map(source => `${source?.source || 'Unknown source'}${formatSourceLocation(source)}`)
    );
    const more = uniqueLocations.size > 1 ? ` + ${uniqueLocations.size - 1} more` : '';
    const chunks = sources.length === 1 ? '1 chunk' : `${sources.length} chunks`;
    return `${firstLocation}${more} · ${chunks}`;
  }

  function createSourceCard(source) {
    const item = document.createElement('div');
    item.className = 'source-tag';

    const meta = document.createElement('div');
    meta.className = 'source-meta';
    const filename = source?.source || 'Unknown source';
    const location = sourceLocationLabel(source);
    const score = Number.isFinite(Number(source?.score)) ? `${source.score}%` : 'unknown score';
    meta.textContent = `${filename} • ${location} • Relevance ${score}`;
    item.appendChild(meta);

    if (source?.preview) {
      const preview = document.createElement('div');
      preview.className = 'source-preview';
      preview.textContent = source.preview;
      item.appendChild(preview);
    }

    return item;
  }

  function appendChatSources(bubble, sources) {
    const detailId = `chatSources-${++chatSourceDisclosureId}`;

    const summary = document.createElement('div');
    summary.className = 'source-summary';

    const summaryText = document.createElement('span');
    summaryText.className = 'source-summary-text';
    summaryText.textContent = `Sources used: ${formatSourceSummary(sources)}`;
    summary.appendChild(summaryText);

    const toggle = document.createElement('button');
    toggle.type = 'button';
    toggle.className = 'source-toggle';
    toggle.setAttribute('aria-expanded', 'false');
    toggle.setAttribute('aria-controls', detailId);
    toggle.setAttribute('aria-label', `Show source details for ${sources.length} ${sources.length === 1 ? 'chunk' : 'chunks'}`);
    toggle.textContent = 'Show details';
    summary.appendChild(toggle);

    const sourceList = document.createElement('div');
    sourceList.className = 'sources chat-sources';
    sourceList.id = detailId;
    sourceList.hidden = true;

    sources.forEach((source, index) => {
      const item = createSourceCard(source);
      if (index >= CHAT_SOURCE_PREVIEW_LIMIT) item.hidden = true;
      sourceList.appendChild(item);
    });

    if (sources.length > CHAT_SOURCE_PREVIEW_LIMIT) {
      const showAll = document.createElement('button');
      showAll.type = 'button';
      showAll.className = 'source-show-all';
      showAll.setAttribute('aria-expanded', 'false');
      showAll.setAttribute('aria-controls', detailId);
      showAll.setAttribute('aria-label', `Show all ${sources.length} source cards`);
      showAll.textContent = 'Show all sources';
      showAll.onclick = () => {
        sourceList.querySelectorAll('.source-tag[hidden]').forEach(item => { item.hidden = false; });
        showAll.setAttribute('aria-expanded', 'true');
        showAll.remove();
      };
      sourceList.appendChild(showAll);
    }

    toggle.onclick = () => {
      const expanded = toggle.getAttribute('aria-expanded') === 'true';
      sourceList.hidden = expanded;
      toggle.setAttribute('aria-expanded', String(!expanded));
      toggle.setAttribute(
        'aria-label',
        expanded
          ? `Show source details for ${sources.length} ${sources.length === 1 ? 'chunk' : 'chunks'}`
          : 'Hide source details'
      );
      toggle.textContent = expanded ? 'Show details' : 'Hide details';
    };

    bubble.appendChild(summary);
    bubble.appendChild(sourceList);
  }

  function appendMessage(role, text, sources = []) {
    const wrapper = document.getElementById('chatWrapper');
    const empty = document.getElementById('emptyState');
    if (empty) empty.style.display = 'none';

    const msg = document.createElement('div');
    msg.className = `message ${role}`;

    const avatar = document.createElement('div');
    avatar.className = `avatar ${role}`;
    avatar.setAttribute('role', 'img');
    avatar.setAttribute('aria-label', role === 'user' ? 'You' : 'Kroma');
    avatar.textContent = role === 'user' ? 'Y' : 'K';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    renderSafeMarkdown(bubble, text);

    if (role !== 'user' && Array.isArray(sources) && sources.length > 0) {
      appendChatSources(bubble, sources);
    }

    msg.appendChild(avatar);
    msg.appendChild(bubble);
    wrapper.appendChild(msg);
    wrapper.scrollTop = wrapper.scrollHeight;
    return msg;
  }

  function appendThinking() {
    const wrapper = document.getElementById('chatWrapper');

  let quizData = [];

  async function generateQuiz(difficulty = null, count = null) {
    if (isPublicDemoMode()) {
      showToast('Enter demo key to generate study tools from custom files.', 'error');
      return;
    }
    const selected = [...document.querySelectorAll('.doc-check:checked')].map(el => el.dataset.name);
    if (selected.length === 0) { showToast('Select at least one document', 'error'); return; }

    saveCurrentChat();

    if (!difficulty || !count) {
      showQuizSettings();
      return;
    }
    document.getElementById('suggestionsBar').style.display = 'none';

    const btn = document.getElementById('quizBtn');
    btn.disabled = true;
    btn.textContent = 'Generating…';

    try {
      const res = await apiFetch('/api/quiz', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ selected_docs: selected, difficulty, count })
      });
      const data = await res.json();
      if (!res.ok) { showToast(data.detail || 'Failed to generate', 'error'); return; }
      quizData = Array.isArray(data.questions) ? data.questions : [];
      quizSourceCatalog = new Map(
        (Array.isArray(data.sources) ? data.sources : [])
          .filter(source => source?.id)
          .map(source => [source.id, source])
      );
      quizAnswers = {};
      showQuiz(quizData, difficulty);
      showToast('Quiz ready!', 'success');
    } catch(e) {
      showToast('Something went wrong', 'error');
    }

    btn.disabled = false;
    setIconButton(btn, 'quiz', 'Quiz me');
  }

  function startQuizWithSettings() {
    const diffBtn = [...document.querySelectorAll('[data-group="diff"]')].find(b => b.style.color === 'var(--gold)' || b.style.color === 'rgb(234, 179, 8)');
    const difficulty = diffBtn?.dataset.val || 'medium';
    const custom = document.getElementById('quizCustomCount')?.value;
    if (custom && parseInt(custom) >= 3) {
      generateQuiz(difficulty, parseInt(custom));
      return;
    }
    const countBtn = [...document.querySelectorAll('[data-group="count"]')].find(b => b.style.color === 'var(--gold)' || b.style.color === 'rgb(234, 179, 8)');
    const count = parseInt(countBtn?.dataset.val || '8');

  function showQuiz(questions, difficulty = 'medium') {
    currentView = 'quiz';
    hideSuggestions();
    const wrapper = document.getElementById('chatWrapper');
    wrapper.innerHTML = '';
    questions = Array.isArray(questions) ? questions : [];

    const header = document.createElement('div');
    header.className = 'quiz-header';
    header.innerHTML = `
      <button class="btn-secondary" onclick="backToChat()" style="width:auto;padding:0.4rem 0.9rem;flex-shrink:0;">← Back to chat</button>
      <span style="text-align:right;">${questions.length} questions · Select your answers then submit</span>
    `;
    wrapper.appendChild(header);

    const qWrapper = document.createElement('div');
    qWrapper.className = 'quiz-wrapper';
    qWrapper.id = 'quizWrapper';

    questions.forEach((q, i) => {
      const qDiv = document.createElement('div');
      qDiv.className = 'quiz-question';
      qDiv.id = `q-${i}`;

      const qNum = document.createElement('div');
      qNum.className = 'quiz-q-num';
      qNum.textContent = `Question ${i + 1} of ${questions.length}`;

      const qText = document.createElement('div');
      qText.className = 'quiz-q-text';
      qText.textContent = q?.question || '';

      const choices = document.createElement('div');
      choices.className = 'quiz-choices';
      (Array.isArray(q?.choices) ? q.choices : []).forEach(c => {
        const letter = (c || '').charAt(0).toUpperCase();
        const choiceBtn = document.createElement('button');
        choiceBtn.className = 'quiz-choice';
        choiceBtn.dataset.q = String(i);
        choiceBtn.dataset.letter = letter;
        choiceBtn.textContent = c;
        choiceBtn.onclick = () => selectAnswer(i, letter, choiceBtn);
        choices.appendChild(choiceBtn);
      });

      const explanation = document.createElement('div');
      explanation.className = 'quiz-explanation';
      explanation.id = `exp-${i}`;
      const explanationText = document.createElement('div');
      explanationText.textContent = `Explanation: ${q?.explanation || ''}`;
      explanation.appendChild(explanationText);
      const sourceList = document.createElement('div');
      sourceList.className = 'sources';
      sourceList.id = `quizSources-${i}`;
      explanation.appendChild(sourceList);

      qDiv.appendChild(qNum);
      qDiv.appendChild(qText);
      qDiv.appendChild(choices);
      qDiv.appendChild(explanation);
      qWrapper.appendChild(qDiv);
    });

    const submitBtn = document.createElement('button');
    submitBtn.className = 'btn-primary';
    submitBtn.id = 'submitQuizBtn';
    submitBtn.textContent = 'Submit Quiz';
    submitBtn.style.cssText = 'margin: 0 2rem 1.5rem; width: calc(100% - 4rem);';
    submitBtn.onclick = submitQuiz;
    qWrapper.appendChild(submitBtn);

    wrapper.appendChild(qWrapper);
  }

  function selectAnswer(qIndex, letter, btn) {
    const choices = document.querySelectorAll(`[data-q="${qIndex}"]`);
    choices.forEach(c => c.classList.remove('selected'));
    btn.classList.add('selected');
    quizAnswers[qIndex] = letter;
  }

  function submitQuiz() {
    const unanswered = quizData.filter((_, i) => !quizAnswers[i]);
    if (unanswered.length > 0) {
      showToast(`Answer all ${quizData.length} questions first`, 'error');
      return;
    }

    let score = 0;
    quizData.forEach((q, i) => {
      const correct = q.answer.trim().charAt(0).toUpperCase();
      const selected = quizAnswers[i];
      const choices = document.querySelectorAll(`[data-q="${i}"]`);

      choices.forEach(c => {
        c.disabled = true;
        if (c.dataset.letter === correct) c.classList.add('reveal-correct');
        if (c.dataset.letter === selected && selected !== correct) c.classList.add('wrong');
      });

      renderQuizSources(q, i);
      document.getElementById(`exp-${i}`).classList.add('show');
      if (selected === correct) score++;
    });

    document.getElementById('submitQuizBtn').remove();

    const msg = score === quizData.length ? 'Perfect score!' :
                score >= quizData.length * 0.7 ? 'Great job!' :
                score >= quizData.length * 0.5 ? 'Keep studying!' : 'Review the material and try again.';

    const scoreDiv = document.createElement('div');
    scoreDiv.className = 'quiz-score';
    scoreDiv.innerHTML = `
      <div class="quiz-score-num">${score}/${quizData.length}</div>
      <div class="quiz-score-label">Your Score</div>
      <div class="quiz-score-msg">${msg}</div>
      <button class="btn-primary" onclick="generateQuiz()" style="width:auto;padding:0.6rem 1.5rem;">Try Again</button>
    `;
    document.getElementById('quizWrapper').appendChild(scoreDiv);
    scoreDiv.scrollIntoView({ behavior: 'smooth' });
  }

  function renderQuizSources(question, index) {
    const sourceList = document.getElementById(`quizSources-${index}`);
    if (!sourceList) return;
    sourceList.innerHTML = '';

    const sourceIds = Array.isArray(question?.source_ids) ? question.source_ids : [];
    const validSources = sourceIds
      .map(id => quizSourceCatalog.get(id))
      .filter(Boolean);

    if (!validSources.length) {
      const item = document.createElement('div');
      item.className = 'source-tag';
      const meta = document.createElement('div');
      meta.className = 'source-meta';
      meta.textContent = 'Unsourced';
      item.appendChild(meta);
      sourceList.appendChild(item);
      return;
    }

    validSources.forEach(source => {
      const item = document.createElement('div');
      item.className = 'source-tag';

      const meta = document.createElement('div');
      meta.className = 'source-meta';
      const filename = source?.source || 'Unknown source';
      const location = sourceLocationLabel(source);
      const score = Number.isFinite(Number(source?.score)) ? `${source.score}%` : 'unknown score';
      meta.textContent = `${source.id} • ${filename} • ${location} • Relevance ${score}`;
      item.appendChild(meta);

      if (source?.preview) {

        preview.className = 'source-preview';
        preview.textContent = source.preview;
        item.appendChild(preview);
      }

      sourceList.appendChild(item);
    });
  }

  const HISTORY_KEY = 'kroma_chat_history';

  function setSavedChats(chats) {
    localStorage.setItem(HISTORY_KEY, JSON.stringify(chats.slice(0, 20)));
  }

  function hasCurrentChatMessages() {
    return chatHistory.length > 0;
  }

  function resetCurrentChat() {
    chatHistory = [];
    loadedChatId = null;
    document.getElementById('exportBtn').style.display = 'none';
    const wrapper = document.getElementById('chatWrapper');
    wrapper.innerHTML = '';
  }

  function saveCurrentChat() {
    if (!hasCurrentChatMessages()) return;
    const saved = getSavedChats();
    const title = chatHistory[0]?.content?.slice(0, 50) || 'Untitled chat';

    if (loadedChatId) {
      const entry = {
        id: loadedChatId,
        title,
        date: new Date().toLocaleDateString(),
        messages: [...chatHistory]
      };
      const idx = saved.findIndex(e => e.id === loadedChatId);
      if (idx !== -1) {
        saved[idx] = entry;
      } else {
        saved.unshift(entry);
      }
      setSavedChats(saved);
      renderHistory();
      return;
    }

    const id = Date.now();
    const entry = {
      id,
      title,
      date: new Date().toLocaleDateString(),
      messages: [...chatHistory]
    };
    saved.unshift(entry);
    setSavedChats(saved);
    loadedChatId = id;
    renderHistory();
  }

  function getSavedChats() {
    try {
      return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
    } catch { return []; }
  }

  function renderHistory() {
    const list = document.getElementById('historyList');
    const saved = getSavedChats();
    list.textContent = '';
    if (!saved.length) {
      const empty = document.createElement('span');
      empty.className = 'empty-lib';
      empty.textContent = 'No saved chats yet.';
      list.appendChild(empty);
      return;
    }
    saved.forEach(entry => {
      const item = document.createElement('div');
      const title = String(entry?.title ?? 'Untitled chat');
      const date = String(entry?.date ?? '');
      item.className = 'history-item';

      const info = document.createElement('div');
      info.className = 'history-info';

      const titleEl = document.createElement('div');
      titleEl.className = 'history-title';
      titleEl.title = title;
      titleEl.textContent = title;

      const dateEl = document.createElement('div');
      dateEl.className = 'history-date';
      dateEl.textContent = date;

      info.appendChild(titleEl);
      info.appendChild(dateEl);
      item.appendChild(info);

      const deleteBtn = document.createElement('button');
      deleteBtn.type = 'button';
      deleteBtn.className = 'history-delete';
      deleteBtn.setAttribute('aria-label', 'Delete chat');
      deleteBtn.textContent = '✕';
      deleteBtn.onclick = (e) => {
        e.stopPropagation();

    });
  }

    wrapper.innerHTML = '';

  function stripJsonFence(text) {
    const trimmed = String(text || '').trim();
    const match = trimmed.match(/^```(?:json)?\s*([\s\S]*?)\s*```$/i);
    return match ? match[1].trim() : trimmed;
  }

  function parseSummarySections(summary) {
    if (Array.isArray(summary)) return summary;
    if (Array.isArray(summary?.sections)) return summary.sections;
    if (typeof summary === 'string') {
      const text = stripJsonFence(summary);
      try {
        const parsed = JSON.parse(text);
        return parseSummarySections(parsed);
      } catch(e) {
        const looksJson = /^[\[{]/.test(text);
        return [{
          heading: 'Overview',
          text: looksJson ? 'Summary could not be parsed into readable sections. Try summarizing again.' : text,
          source_ids: [],
          bullets: []
        }];
      }
    }
    return [{
      heading: 'Overview',
      text: 'Summary could not be parsed into readable sections. Try summarizing again.',
      source_ids: [],
      bullets: []
    }];
  }

  function showSummary(summary, sources = []) {
    currentView = 'summary';
    hideSuggestions();
    const wrapper = document.getElementById('chatWrapper');
    wrapper.style.cssText = '';
    wrapper.replaceChildren();

    const header = document.createElement('div');
    header.style.cssText = 'display:flex;align-items:center;padding:0.75rem 2rem;border-bottom:1px solid var(--border);flex-shrink:0;gap:1rem;';
    const backButton = document.createElement('button');
    backButton.className = 'btn-secondary';
    backButton.style.cssText = 'width:auto;padding:0.4rem 0.9rem;flex:none;white-space:nowrap;';
    backButton.textContent = '← Back to chat';
    backButton.addEventListener('click', backToChat);
    header.appendChild(backButton);

    const title = document.createElement('span');
    title.style.cssText = 'font-size:0.85rem;color:var(--text-3);flex:1;text-align:right;';
    title.textContent = 'Document Summary';
    header.appendChild(title);
    wrapper.appendChild(header);

    const content = document.createElement('div');
    content.style.cssText = 'flex:1;overflow-y:auto;padding:1.5rem 2rem;max-width:760px;margin:0 auto;width:100%;';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.style.cssText = 'max-width:100%;';

    const sourceCatalog = new Map(
      (Array.isArray(sources) ? sources : [])
        .filter(source => source?.id)
        .map(source => [source.id, source])
    );
    const sections = parseSummarySections(summary);

    sections.forEach(section => {
      const sectionEl = document.createElement('section');
      sectionEl.style.cssText = 'margin-bottom:1.25rem;';

      const heading = document.createElement('h2');
      heading.textContent = section?.heading || 'Summary';
      sectionEl.appendChild(heading);

      if (section?.text) {
        const paragraph = document.createElement('p');
        paragraph.textContent = section.text;
        sectionEl.appendChild(paragraph);

        const sourceList = document.createElement('div');
        sourceList.className = 'sources';
        renderSummarySources(sourceList, section.source_ids, sourceCatalog);
        sectionEl.appendChild(sourceList);
      }

      const bullets = Array.isArray(section?.bullets) ? section.bullets : [];
      if (bullets.length) {
        const list = document.createElement('ul');
        bullets.forEach(bullet => {
          const item = document.createElement('li');
          const text = document.createElement('span');
          text.textContent = bullet?.text || '';
          item.appendChild(text);

          const sourceList = document.createElement('div');
          sourceList.className = 'sources';
          renderSummarySources(sourceList, bullet?.source_ids, sourceCatalog);
          item.appendChild(sourceList);
          list.appendChild(item);
        });
        sectionEl.appendChild(list);
      }

      if (!section?.text && !bullets.length) {
        const sourceList = document.createElement('div');
        sourceList.className = 'sources';
        renderSummarySources(sourceList, section?.source_ids, sourceCatalog);
        sectionEl.appendChild(sourceList);
      }

      bubble.appendChild(sectionEl);
    });

    content.appendChild(bubble);
    wrapper.appendChild(content);
  }

  function hideSuggestions() {
    document.getElementById('suggestionsBar').style.display = 'none';
  }

  function canShowSuggestions() {
    return (isIndexed || isPublicDemoMode())
      && currentView === 'chat'
      && chatHistory.length === 0
      && loadedChatId === null;
  }

  let suggestionsPending = false;

  async function fetchSuggestions() {
    if (!canShowSuggestions()) return;
    if (isPublicDemoMode()) {
      renderSuggestions(publicDemoQuestions);
      return;
    }
    const selected = [...document.querySelectorAll('.doc-check:checked')].map(el => el.dataset.name);
    if (selected.length === 0) return;
    if (suggestionsPending) return;
    suggestionsPending = true;
    try {
      const res = await apiFetch('/api/suggest', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ selected_docs: selected })
      });
      if (!res.ok) { suggestionsPending = false; return; }
      const data = await res.json();
      suggestionsPending = false;
      if (!data.questions?.length) return;
      renderSuggestions(data.questions);
    } catch(e) { suggestionsPending = false; }
  }

  function renderSuggestions(questions) {
    const bar = document.getElementById('suggestionsBar');
    const row = document.getElementById('suggestionsRow');
    if (!canShowSuggestions()) {
      bar.style.display = 'none';
      return;
    }
    row.innerHTML = '';
    questions.forEach(q => {
      const btn = document.createElement('button');
      btn.className = 'suggestion-btn';
      btn.textContent = q;
      btn.onclick = () => {
        document.getElementById('chatInput').value = q;
        bar.style.display = 'none';
        sendMessage();
      };
      row.appendChild(btn);
    });
    bar.style.display = 'flex';
    bar.style.flexDirection = 'column';
  }

  function showConfirm(message, onConfirm) {
    const overlay = document.createElement('div');
    overlay.className = 'confirm-overlay';

    const box = document.createElement('div');
    box.className = 'confirm-box';

    const msg = document.createElement('div');
    msg.className = 'confirm-msg';
    msg.textContent = String(message ?? '');

    const buttons = document.createElement('div');
    buttons.className = 'confirm-btns';

    const cancelBtn = document.createElement('button');
    cancelBtn.className = 'btn-secondary';
    cancelBtn.type = 'button';
    cancelBtn.style.cssText = 'width:auto;padding:0.5rem 1rem;';
    cancelBtn.textContent = 'Cancel';

    const okBtn = document.createElement('button');
    okBtn.className = 'btn-primary';
    okBtn.type = 'button';
    okBtn.style.cssText = 'width:auto;padding:0.5rem 1rem;background:#dc2626;color:white;';
    okBtn.textContent = 'Confirm';

    buttons.appendChild(cancelBtn);
    buttons.appendChild(okBtn);
    box.appendChild(msg);
    box.appendChild(buttons);
    overlay.appendChild(box);
    document.body.appendChild(overlay);
    cancelBtn.onclick = () => overlay.remove();
    okBtn.onclick = () => { overlay.remove(); onConfirm(); };
  }

  renderHistory();
  init();
</script>
</body>
</html>
